rules:
  - id: excessive_logging
    name: Excessive Console Logging
    severity: minor
    message: System.out.println detected. Use a logger (SLF4J/Log4j) in production.
    remediation: Replace System.out.println with logger.info() or logger.debug().
    effort: Low
    tags: [logging, best_practice]
    carbon_impact: 1e-8
    energy_factor: 1

  - id: blocking_io
    name: Blocking I/O
    severity: major
    message: Thread.sleep() blocks the thread. Use scheduled executors or async mechanisms.
    remediation: Use ScheduledExecutorService or reactive streams.
    effort: Medium
    tags: [performance, concurrency]
    carbon_impact: 5e-7
    energy_factor: 5

  - id: string_concatenation_in_loop
    name: String Concatenation in Loop
    severity: major
    message: String concatenation in loops creates unnecessary objects. Use StringBuilder.
    remediation: Use StringBuilder.append() inside the loop.
    effort: Medium
    tags: [memory, performance]
    carbon_impact: 2e-7
    energy_factor: 2

  - id: empty_block
    name: Empty Block
    severity: minor
    message: Empty block detected. Remove or implement logic.
    remediation: Remove the empty block or add a comment/implementation.
    effort: Low
    tags: [code_quality]
    carbon_impact: 0
    energy_factor: 0

  - id: insecure_crypto
    name: Insecure Cryptographic Algorithm
    severity: critical
    message: Use of MD5 or DES detected. These algorithms are considered broken.
    pattern: |
      MessageDigest\.getInstance\(["'](MD5|SHA-1)["']\)|Cipher\.getInstance\(["']DES["']\)
    remediation: Use SHA-256 or AES for cryptographic operations.
    effort: Medium
    tags: [security, cryptography]

  - id: hardcoded_password
    name: Potential Hardcoded Password
    severity: critical
    message: Potential hardcoded password or secret detected in assignment.
    pattern: |
      (password|secret|key|token)\s*=\s*["'][^"']{8,}["']
    remediation: Use environment variables or a secret management service.
    effort: Medium
    tags: [security, secrets]

  - id: trust_all_certs
    name: Insecure Trust Manager
    severity: critical
    message: Trusting all SSL certificates is a security risk (Man-in-the-Middle).
    pattern: |
      checkClientTrusted|checkServerTrusted|X509TrustManager
    remediation: Implement proper certificate validation logic.
    effort: High
    tags: [security, network]
